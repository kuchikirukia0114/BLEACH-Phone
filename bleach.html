<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>幽冥状态栏</title>
<!-- 模块化样式：core -->
<link rel="stylesheet" href="./styles/core/base.css">
<link rel="stylesheet" href="./styles/core/themes.css">
<link rel="stylesheet" href="./styles/core/phone-shell.css">
<link rel="stylesheet" href="./styles/core/phone-screen.css">
<link rel="stylesheet" href="./styles/core/app-shell.css">
<!-- 模块化样式：apps -->
<link rel="stylesheet" href="./styles/apps/news/index.css">
<link rel="stylesheet" href="./styles/apps/network/index.css">
<link rel="stylesheet" href="./styles/apps/music/index.css">
<link rel="stylesheet" href="./styles/apps/items/index.css">
<link rel="stylesheet" href="./styles/apps/chars/index.css">
<link rel="stylesheet" href="./styles/apps/data/index.css">
<link rel="stylesheet" href="./styles/apps/contact/index.css">
<link rel="stylesheet" href="./styles/apps/settings/index.css">
<link rel="stylesheet" href="./styles/apps/ai/index.css">
<link rel="stylesheet" href="./styles/apps/map/index.css">
<link rel="stylesheet" href="./styles/apps/weather/index.css">

<link rel="stylesheet" href="./styles/apps/screensaver/index.css">
</head>
<body class="theme-white">
  <div class="flip-phone" id="phone">
    <div class="upper-flip">
      <!-- 手机外壳（合上时可见） -->
      <div class="flip-back">
        <button class="back-logo" id="lid-open-button" type="button" aria-label="打开翻盖">
          <img class="back-logo-thumb" id="lid-open-thumb" alt="当前屏保缩略图">
          <video class="back-logo-thumb back-logo-thumb-video" id="lid-open-thumb-video" muted loop playsinline webkit-playsinline preload="metadata" aria-hidden="true"></video>
          <svg viewBox="0 0 24 24">
            <path d="M12,2 C7.5,2 4,5.5 4,10 C4,14 6,17 8,22 C10,20 11,18 12,18 C13,18 14,20 16,22 C18,17 20,14 20,10 C20,5.5 16.5,2 12,2 Z" />
          </svg>
        </button>
        <div class="outer-display" id="outer-time">00:00</div>
      </div>
      
      <!-- 手机内屏（翻开时可见） -->
      <div class="flip-front">
        <div class="speaker"></div>
        <div class="screen-frame">
          <div class="screen">
            <div class="scanline"></div>
            <div class="status-bar">
              <div class="signal-container">
                <svg class="scythe scythe-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M14,2 L14,5 C18,5 21,8 21,12 C21,12.5 20.9,13 20.8,13.5 L22.7,14.5 C22.9,13.7 23,12.9 23,12 C23,7 19,3 14,2 Z M10,2 L10,22 L12,22 L12,2 L10,2 Z" />
                </svg>
                <svg class="scythe alien-icon" viewBox="0 0 17 17" xmlns="http://www.w3.org/2000/svg">
                  <path class="alien-head" d="M9.014,0.143 C5.159,0.143 2.031,3.122 2.031,6.794 C2.031,10.469 7.209,16 9.014,16 C10.822,16 16,10.469 16,6.794 C16,3.122 12.873,0.143 9.014,0.143 Z"/>
                  <ellipse class="alien-eye-open" cx="6.5" cy="9" rx="1.8" ry="1.2" transform="rotate(40 6.5 9)"/>
                  <ellipse class="alien-eye-open" cx="11.5" cy="9" rx="1.8" ry="1.2" transform="rotate(-40 11.5 9)"/>
                  <line class="alien-eye-blink" x1="4.7" y1="9" x2="8.3" y2="9" transform="rotate(40 6.5 9)"/>
                  <line class="alien-eye-blink" x1="9.7" y1="9" x2="13.3" y2="9" transform="rotate(-40 11.5 9)"/>
                </svg>
                <div class="signal-bar bar-1"></div>
                <div class="signal-bar bar-2"></div>
                <div class="signal-bar bar-3"></div>
                <div class="signal-bar bar-4"></div>
              </div>
              <div class="time" id="realtime">15:34</div>
              <div class="battery-container">
                <div class="battery-body">
                  <div class="battery-level"></div>
                  <svg class="soul-icon soul-icon-ghost" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3.2c-3.6 0-6.5 2.7-6.5 6v8.2c0 .5.3.8.8.8.8 0 1.1-.8 1.6-.8s.8.7 1.5.8c.6 0 .9-.8 1.6-.8s1 .8 1.6.8 1-.8 1.6-.8 1 .8 1.6.8c.6 0 .9-.8 1.5-.8s.9.8 1.7.8c.5 0 .8-.3.8-.8V9.2c0-3.3-2.9-6-6.5-6zm-2.2 7.2a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm4.4 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" />
                  </svg>
                  <svg class="soul-icon soul-icon-ufo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.67459 8.59375C3.4317 9.35912 2 10.523 2 11.8265C2 13.0345 3.22958 14.1226 5.19488 14.8847L3.85699 17.1145C3.64388 17.4697 3.75906 17.9304 4.11424 18.1435C4.46943 18.3566 4.93012 18.2415 5.14323 17.8863L6.64323 15.3863C6.64924 15.3763 6.65498 15.3662 6.66046 15.356C8.00688 15.7116 9.57078 15.9366 11.2501 15.9886V19.0004C11.2501 19.4146 11.5859 19.7504 12.0001 19.7504C12.4143 19.7504 12.7501 19.4146 12.7501 19.0004V15.9886C14.4294 15.9366 15.9933 15.7115 17.3397 15.356C17.3452 15.3661 17.351 15.3763 17.357 15.3863L18.857 17.8863C19.0701 18.2415 19.5308 18.3566 19.886 18.1435C20.2412 17.9304 20.3563 17.4697 20.1432 17.1145L18.8053 14.8846C20.7705 14.1225 22 13.0344 22 11.8265C22 10.523 20.5683 9.35912 18.3254 8.59375C18.2008 8.88403 17.9937 9.17776 17.6568 9.41211C16.8685 9.96038 15.3013 10.5003 12 10.5003C8.6987 10.5003 7.1315 9.96038 6.34322 9.41211C6.00629 9.17776 5.79918 8.88403 5.67459 8.59375ZM13 13.0003C13 13.5526 12.5523 14.0003 12 14.0003C11.4477 14.0003 11 13.5526 11 13.0003C11 12.448 11.4477 12.0003 12 12.0003C12.5523 12.0003 13 12.448 13 13.0003ZM7 13.0003C7.55228 13.0003 8 12.5526 8 12.0003C8 11.448 7.55228 11.0003 7 11.0003C6.44772 11.0003 6 11.448 6 12.0003C6 12.5526 6.44772 13.0003 7 13.0003ZM18 12.0003C18 12.5526 17.5523 13.0003 17 13.0003C16.4477 13.0003 16 12.5526 16 12.0003C16 11.448 16.4477 11.0003 17 11.0003C17.5523 11.0003 18 11.448 18 12.0003Z" />
                    <path opacity="0.5" d="M7.05518 8.0054C7.40336 5.73714 9.36329 4 11.729 4H12.2714C14.6371 4 16.597 5.73714 16.9452 8.0054C16.9133 8.07425 16.8662 8.13466 16.8005 8.18039C16.3864 8.4684 15.19 9 12.0002 9C8.81036 9 7.614 8.4684 7.19991 8.18039C7.13417 8.13466 7.08706 8.07425 7.05518 8.0054Z" />
                  </svg>
                </div>
                <div class="battery-head"></div>
              </div>
            </div>
            <!-- 屏幕内容区域 -->
            <div id="screen-content">
              <div class="screen-saver" id="screen-saver">
                <img class="screen-saver-image" id="screen-saver-image" alt="">
                <video class="screen-saver-video" id="screen-saver-video" muted loop playsinline webkit-playsinline preload="metadata" aria-hidden="true"></video>
                <div class="screen-saver-overlay"></div>
                <div class="screen-saver-clock" id="screen-saver-time">00:00</div>
                <div class="screen-saver-date" id="screen-saver-date">
                  <span class="screen-saver-date-text" id="screen-saver-date-text">2001.01.01</span>
                  <span class="screen-saver-weekday" id="screen-saver-weekday">星期一</span>
                </div>
              </div>
              <!-- 九宫格菜单 -->
              <svg class="menu-grad-defs" width="0" height="0" aria-hidden="true" style="position:absolute;pointer-events:none;">
                <defs>
                  <linearGradient id="menu-icon-grad" gradientUnits="userSpaceOnUse" x1="0" y1="12" x2="24" y2="12">
                    <stop offset="0%" stop-color="#f0a0c0"/>
                    <stop offset="50%" stop-color="#c08de8"/>
                    <stop offset="100%" stop-color="#7b8bf5"/>
                  </linearGradient>
                </defs>
              </svg>
              <div class="normal-ui grid-menu" style="padding: 10px;">
                <div class="grid-item" data-app="weather" data-title="天气">
                  <div class="icon">
                    <!-- 天气：云 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M5.5 18h12a4.8 4.8 0 0 0 .84-9.53A6.6 6.6 0 0 0 5 9.6 4.2 4.2 0 0 0 5.5 18z"></path>
                    </svg>
                  </div>
                  <span>天气</span>
                </div>
                <div class="grid-item" data-app="news" data-title="新闻">
                  <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="6.5" width="18" height="12.5" rx="2"></rect>
                      <line x1="9" y1="3.6" x2="12.5" y2="6.5"></line>
                      <circle cx="9" cy="12.75" r="2.35"></circle>
                      <line x1="14" y1="11.5" x2="18" y2="11.5"></line>
                      <line x1="14" y1="14.5" x2="18" y2="14.5"></line>
                    </svg>
                  </div>
                  <span>新闻</span>
                </div>
                <div class="grid-item" data-app="map" data-title="地图">
                  <div class="icon">
                    <!-- 地图 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                      <line x1="9" y1="5.5" x2="9" y2="18.5"></line>
                      <line x1="15" y1="5.5" x2="15" y2="18.5"></line>
                    </svg>
                  </div>
                  <span>地图</span>
                </div>
                <div class="grid-item" data-app="sms" data-title="短信">
                  <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M5 6h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-8l-4 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"></path>
                      <line x1="8" y1="10" x2="16" y2="10"></line>
                      <line x1="8" y1="13" x2="14" y2="13"></line>
                    </svg>
                  </div>
                  <span>短信</span>
                </div>
                <div class="grid-item" data-app="items" data-title="道具">
                  <div class="icon">
                    <!-- 背包：箱子 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="21 8 21 21 3 21 3 8"></polyline>
                      <rect x="1" y="3" width="22" height="5"></rect>
                      <line x1="10" y1="12" x2="14" y2="12"></line>
                    </svg>
                  </div>
                  <span>道具</span>
                </div>
                <div class="grid-item" data-app="chars" data-title="情报">
                  <div class="icon">
                    <!-- 情报：文件 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <line x1="16" y1="13" x2="8" y2="13"></line>
                      <line x1="16" y1="17" x2="8" y2="17"></line>
                      <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                  </div>
                  <span>情报</span>
                </div>
                <div class="grid-item" data-app="music" data-title="音乐">
                  <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;">
                      <path d="M8.8 17.1V6.6l10.7-2.1v10.7"></path>
                      <line x1="8.8" y1="6.6" x2="19.5" y2="4.5"></line>
                      <ellipse cx="7.1" cy="18.3" rx="2.5" ry="1.9" fill="currentColor" stroke="none" transform="rotate(-14 7.1 18.3)"></ellipse>
                      <ellipse cx="17.8" cy="16.2" rx="2.5" ry="1.9" fill="currentColor" stroke="none" transform="rotate(-14 17.8 16.2)"></ellipse>
                    </svg>
                  </div>
                  <span>音乐</span>
                </div>
                <div class="grid-item" data-app="records" data-title="影音">
                  <div class="icon">
                    <!-- 影音：复古 LCD 胶片/播放 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
                      <rect x="3" y="2.5" width="18" height="19" rx="1.4"></rect>
                      <rect x="5.5" y="7.5" width="13" height="9"></rect>
                      <rect x="6" y="4.2" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="9.1" y="4.2" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="13.5" y="4.2" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="16.6" y="4.2" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="6" y="18.4" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="9.1" y="18.4" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="13.5" y="18.4" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <rect x="16.6" y="18.4" width="1.4" height="1.4" fill="currentColor" stroke="none"></rect>
                      <path d="M10.2 10.2v3.6l4.7-1.8z" fill="currentColor" stroke="none"></path>
                    </svg>
                  </div>
                  <span>影音</span>
                </div>
                <div class="grid-item" data-app="settings" data-title="设置">
                  <div class="icon">
                    <!-- 设置/齿轮 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="3"></circle>
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                  </div>
                  <span>设置</span>
                </div>
                <div class="grid-item" data-app="contact" data-title="联络">
                  <div class="icon">
                    <!-- 电话簿：人像列表 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                      <circle cx="9" cy="7" r="4"></circle>
                      <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                      <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                  </div>
                  <span>联络</span>
                </div>
                <div class="grid-item" data-app="data" data-title="数据">
                  <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M6 3.5h9l3 3v13a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 4 19.5V5A1.5 1.5 0 0 1 5.5 3.5z"></path>
                      <path d="M9 3.5v5h6v-5"></path>
                      <rect x="8" y="12" width="8" height="5" rx="0.8"></rect>
                      <line x1="10.5" y1="14.5" x2="13.5" y2="14.5"></line>
                    </svg>
                  </div>
                  <span>数据</span>
                </div>

              </div>

              <div class="app-window" id="app-window">
                <div class="app-header">
                  <span class="app-title" id="app-window-title">天气</span>
                  <div class="app-header-right">
                    <span class="app-signal" id="app-header-signal">REC · 2G</span>
                  </div>
                </div>
                <div class="app-body" id="app-window-body"></div>
                <div class="app-footer">
                  <span class="app-softkey" id="app-softkey-left">返回</span>
                  <span class="app-softkey center" id="app-softkey-center">选择</span>
                  <span class="app-softkey" id="app-softkey-right">关闭</span>
                </div>
              </div>
              
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="hinge">
      <div class="hinge-detail"></div>
      <div class="hinge-detail"></div>
    </div>

    <div class="lower-body">
      <div class="directional-pad">
        <div class="d-pad-cluster">
          <button class="side-oval-button top-left" id="side-button-top-left" data-action="confirm-menu" type="button" aria-label="确认或进入菜单"></button>
          <button class="side-oval-button bottom-left" id="side-button-bottom-left" data-action="open-contact" type="button" aria-label="进入联络页"></button>
          <div class="d-pad-circle" id="dpad">
            <div class="d-pad-icon up">
              <svg viewBox="0 0 24 24"><path d="M12 7l-5 5M12 7l5 5"></path></svg>
            </div>
            <div class="d-pad-icon right">
              <svg viewBox="0 0 24 24"><path d="M7 7l5 5-5 5"></path></svg>
            </div>
            <div class="d-pad-icon down">
              <svg viewBox="0 0 24 24"><path d="M7 12l5 5 5-5"></path></svg>
            </div>
            <div class="d-pad-icon left">
              <svg viewBox="0 0 24 24"><path d="M17 7l-5 5 5 5"></path></svg>
            </div>
            <div class="d-pad-center-ring">
              <button class="d-pad-center" type="button" onclick="pressDpadCenter(event)">
                <svg viewBox="0 0 44 24" aria-hidden="true">
                  <text x="22" y="12" text-anchor="middle" dominant-baseline="middle">OK</text>
                </svg>
              </button>
            </div>
          </div>
          <button class="side-oval-button top-right" id="side-button-top-right" data-action="back-cancel" type="button" aria-label="返回或取消"></button>
          <button class="side-oval-button bottom-right" id="side-button-bottom-right" data-action="go-screensaver" type="button" aria-label="返回屏保"></button>
        </div>
      </div>
      <div class="keypad">
        <div class="button" data-keypad="1">1<span class="sub">&nbsp;</span></div>
        <div class="button" data-keypad="2">2<span class="sub">ABC</span></div>
        <div class="button" data-keypad="3">3<span class="sub">DEF</span></div>
        <div class="button" data-keypad="4">4<span class="sub">GHI</span></div>
        <div class="button" data-keypad="5">5<span class="sub">JKL</span></div>
        <div class="button" data-keypad="6">6<span class="sub">MNO</span></div>
        <div class="button" data-keypad="7">7<span class="sub">PQRS</span></div>
        <div class="button" data-keypad="8">8<span class="sub">TUV</span></div>
        <div class="button" data-keypad="9">9<span class="sub">WXYZ</span></div>
        <div class="button" data-keypad="*">*<span class="sub"></span></div>
        <div class="button" data-keypad="0">0<span class="sub">+</span></div>
        <div class="button" data-keypad="#">#<span class="sub"></span></div>
      </div>
    </div>
  </div>

  <script src="./scripts/state.js"></script>
  <script src="./scripts/storage.js"></script>
  <script src="./scripts/apps/shared/index.js"></script>
  <script src="./scripts/apps/network/index.js"></script>
  <script src="./scripts/apps/music/index.js"></script>
  <script src="./scripts/apps/items/index.js"></script>
  <script src="./scripts/apps/chars/index.js"></script>
  <script src="./scripts/apps/news/index.js"></script>
  <script src="./scripts/apps/ai/index.js"></script>
  <script src="./scripts/apps/settings/index.js"></script>
  <script src="./scripts/apps/contact/index.js"></script>
  <script src="./scripts/apps/data/index.js"></script>
  <script src="./scripts/apps/map/index.js"></script>
  <script src="./scripts/apps/weather/weather-data.js"></script>
  <script src="./scripts/apps/weather/index.js"></script>
  <script src="./scripts/main.js"></script>
</body>
</html>
